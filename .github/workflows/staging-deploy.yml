name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy Frontend to S3
        run: echo "Upload to S3 (staging)"

      - name: Deploy Backend to EC2
        run: echo "SSH into EC2 and restart services"
